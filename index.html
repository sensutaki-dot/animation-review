<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Animation Review — Frame Annotations & Time Comments</title>

  <!-- Supabase v2 UMD -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body{font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial; background:#0f1724; color:#e6eef8; margin:0; padding:22px;}
    .wrap{max-width:1080px;margin:0 auto;}
    h1{margin:0 0 12px 0;font-size:22px}
    .card{background:#0b1220;border-radius:10px;padding:14px;margin-bottom:14px;box-shadow:0 6px 24px rgba(2,6,23,0.6)}
    label{display:block;margin-bottom:8px}
    input[type=file]{display:block;margin-bottom:12px}
    button{background:#1f6feb;border:none;color:white;padding:8px 12px;border-radius:8px;cursor:pointer;margin-right:8px}
    button.small{padding:6px 8px}
    .hint{color:#9fb0d6;font-size:13px;margin-top:8px}
    .shots{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px}
    .shot{background:#071027;border-radius:8px;padding:12px;width:calc(50% - 12px);box-sizing:border-box}
    .shot h3{margin:0 0 8px 0;font-size:14px}
    video{width:100%;border-radius:6px;background:black;display:block}
    .status{margin-top:8px;color:#9fb0d6;font-size:13px}
    .sceneControls{display:flex;gap:8px;align-items:center;margin-top:12px;flex-wrap:wrap}
    .currentShot{font-weight:600;margin-left:8px}
    .playerWrap{background:#000;padding:8px;border-radius:8px;margin-top:8px;display:flex;justify-content:center}
    .sceneCanvasWrap{position:relative; display:inline-block; max-width:100%;}
    canvas{position:absolute; left:0; top:0; pointer-events:none}
    .drawControls{margin-top:8px; display:flex; gap:8px; align-items:center; flex-wrap:wrap}
    .comments{margin-top:10px; max-height:220px; overflow:auto; background:#041226; padding:8px; border-radius:6px}
    .comment{padding:6px;border-bottom:1px solid rgba(255,255,255,0.03); font-size:14px}
    .comment time{color:#9fb0d6; font-size:12px; margin-right:8px}
    @media (max-width:700px){ .shot{width:100%} }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Animation Review — Frame Annotations & Comments</h1>

    <div class="card">
      <label for="fileInput"><strong>1) Selecione o playblast (.mov / .mp4)</strong></label>
      <input id="fileInput" type="file" accept="video/*" />
      <div style="margin-top:8px;">
        <button id="btnUpload">Upload</button>
        <button id="btnPlayScene">Play Scene</button>
        <button id="btnStopScene">Stop Scene</button>
      </div>
      <div class="hint">Use nomes como <code>sh_07_v008.mov</code> ou <code>SH010_v003.mov</code>. O sistema detecta shot & versão automaticamente.</div>
      <div id="status" class="status"></div>
    </div>

    <div class="card">
      <strong>2) Cena — últimas versões de cada shot</strong>
      <div id="shots" class="shots"></div>
      <div id="emptyHint" class="hint"></div>

      <div class="card" style="margin-top:12px;background:#07122a">
        <strong>Scene Player, Frame Annotations & Time Comments</strong>
        <div id="sceneArea" style="margin-top:10px">

          <div class="sceneControls">
            <button id="scenePrev">◀ Prev</button>
            <button id="scenePlay">▶ Play</button>
            <button id="scenePause">⏸ Pause</button>
            <button id="sceneNext">Next ▶</button>

            <button id="toggleDraw" class="small">Draw</button>
            <button id="clearDraw" class="small">Clear</button>
            <button id="saveFrame" class="small">Save Frame Annotation</button>
            <button id="saveFull" class="small">Save Full Annotation</button>
            <button id="toggleOverlay" class="small">Toggle Overlay</button>

            <label style="margin-left:8px">Color: <input id="colorPicker" type="color" value="#ff2b2b" /></label>
            <label>Brush: <input id="brushSize" type="range" min="1" max="40" value="6" /></label>

            <span class="currentShot" id="currentShotLabel"></span>
          </div>

          <div class="playerWrap" id="scenePlayerWrap" style="margin-top:10px">
            <!-- video + canvas injected here -->
          </div>

          <div style="margin-top:10px;">
            <label><strong>Add comment at current time</strong></label>
            <div style="display:flex; gap:8px; align-items:center; margin-top:6px;">
              <input id="commentInput" placeholder="Escreva seu comentário..." style="flex:1; padding:8px; border-radius:6px; border:1px solid #23314b; background:#07122a; color:white">
              <button id="addComment" class="small">Add Comment at time</button>
            </div>

            <div class="comments" id="commentsList" aria-live="polite"></div>
          </div>

        </div>
      </div>

    </div>
  </div>

<script>

const { createClient } = window.supabase;
const client = createClient(SUPABASE_URL, SUPABASE_KEY);

/* DOM */
const btnUpload = document.getElementById("btnUpload");
const btnPlayScene = document.getElementById("btnPlayScene");
const btnStopScene = document.getElementById("btnStopScene");
const fileInput = document.getElementById("fileInput");
const statusEl = document.getElementById("status");
const shotsContainer = document.getElementById("shots");
const emptyHint = document.getElementById("emptyHint");
const scenePlayerWrap = document.getElementById("scenePlayerWrap");
const currentShotLabel = document.getElementById("currentShotLabel");
const btnScenePrev = document.getElementById("scenePrev");
const btnScenePlay = document.getElementById("scenePlay");
const btnScenePause = document.getElementById("scenePause");
const btnSceneNext = document.getElementById("sceneNext");
const btnToggleDraw = document.getElementById("toggleDraw");
const btnClearDraw = document.getElementById("clearDraw");
const btnSaveFrame = document.getElementById("saveFrame");
const btnSaveFull = document.getElementById("saveFull");
const btnToggleOverlay = document.getElementById("toggleOverlay");
const colorPicker = document.getElementById("colorPicker");
const brushSize = document.getElementById("brushSize");
const commentInput = document.getElementById("commentInput");
const addCommentBtn = document.getElementById("addComment");
const commentsList = document.getElementById("commentsList");

let latestShotsMap = {}; // { SH07: {version, path, fileName} }
let scenePlaylist = [];
let sceneIndex = 0;
let sceneVideoEl = null;
let overlayCanvas = null;
let overlayCtx = null;
let drawActive = false;
let overlayVisible = true;
let currentAnnotationShot = null;
let currentAnnotationVersion = null;

/* ---------- Upload (same as before) ---------- */
btnUpload.addEventListener("click", async () => {
  const f = fileInput.files[0];
  if (!f) { alert("Selecione um arquivo antes."); return; }
  statusEl.textContent = "Enviando...";

  const name = f.name;
  const shotMatch = name.match(/(sh[_-]?\d+)/i);
  const versionMatch = name.match(/_v0*(\d+)/i) || name.match(/v0*(\d+)/i);
  if (!shotMatch || !versionMatch) {
    if (!shotMatch) alert("Não foi possível detectar o shot. Use 'sh_07_v001' ou 'SH010_v001'.");
    else alert("Não foi possível detectar a versão. Use '_v001'.");
    statusEl.textContent = "";
    return;
  }

  const shotRaw = shotMatch[1].toUpperCase().replace(/[_-]/g,""); // SH07
  const versionNum = parseInt(versionMatch[1],10);
  const destPath = `${shotRaw}/${name}`;

  try {
    const { data, error } = await client.storage.from(bucketName).upload(destPath, f, { upsert: true });
    if (error) { console.error("Upload error:", error); alert("Erro no upload: "+(error.message||JSON.stringify(error))); statusEl.textContent=""; return; }
    statusEl.textContent = `Upload concluído: ${shotRaw} v${versionNum.toString().padStart(3,"0")}`;
    fileInput.value = "";
    await loadShots();
  } catch (e) {
    console.error(e);
    alert("Erro inesperado.");
    statusEl.textContent = "";
  }
});

/* ---------- Listing & latest map (same as before) ---------- */
async function loadShots(){
  shotsContainer.innerHTML = "";
  emptyHint.textContent = "Carregando...";
  try {
    const { data: rootList, error: errRoot } = await client.storage.from(bucketName).list("", { limit: 1000 });
    if (errRoot) { console.error(errRoot); emptyHint.textContent = "Erro ao listar arquivos."; return; }
    const shotsMap = {};
    function processFilePath(path) {
      const filename = path.split("/").pop();
      const shotMatch = filename.match(/(sh[_-]?\d+)/i) || (path.match(/^(sh[_-]?\d+)/i));
      const versionMatch = filename.match(/_v0*(\d+)/i) || filename.match(/v0*(\d+)/i);
      if (!shotMatch || !versionMatch) return;
      const shotRaw = shotMatch[1].toUpperCase().replace(/[_-]/g, "");
      const version = parseInt(versionMatch[1],10);
      if (!shotsMap[shotRaw] || shotsMap[shotRaw].version < version) {
        shotsMap[shotRaw] = { version, path, fileName: filename };
      }
    }
    for (const entry of rootList) {
      const name = entry.name || entry;
      if (name.match(/\.(mov|mp4|m4v)$/i)) processFilePath(name);
      else {
        const { data: innerList, error: e2 } = await client.storage.from(bucketName).list(name, { limit: 1000 });
        if (e2) processFilePath(name); else for (const f of innerList) processFilePath(`${name}/${f.name}`);
      }
    }
    latestShotsMap = shotsMap;
    const keys = Object.keys(shotsMap).sort((a,b)=>parseInt(a.replace(/[^0-9]/g,''),10) - parseInt(b.replace(/[^0-9]/g,''),10));
    if (keys.length === 0) { emptyHint.textContent = "Nenhum shot encontrado."; latestShotsMap = {}; return; }
    emptyHint.textContent = "";
    shotsContainer.innerHTML = "";
    for (const shotKey of keys) {
      const info = shotsMap[shotKey];
      const parts = info.path.split("/");
      const encodedParts = parts.map(p=>encodeURIComponent(p));
      const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/${bucketName}/${encodedParts.join("/")}`;
      const wrap = document.createElement("div");
      wrap.className = "shot";
      const title = document.createElement("h3");
      title.textContent = `${shotKey} — v${info.version.toString().padStart(3,"0")}`;
      wrap.appendChild(title);
      const vid = document.createElement("video");
      vid.src = publicUrl;
      vid.controls = true;
      vid.setAttribute("playsinline","");
      vid.setAttribute("preload","none");
      wrap.appendChild(vid);
      shotsContainer.appendChild(wrap);
    }
  } catch (err) { console.error("Erro loadShots:", err); emptyHint.textContent = "Erro inesperado ao carregar arquivos."; }
}

/* ---------- Scene player & overlay (like previous) ---------- */
function buildPlaylistFromLatestShots(){
  const keys = Object.keys(latestShotsMap).sort((a,b)=>parseInt(a.replace(/[^0-9]/g,''),10)-parseInt(b.replace(/[^0-9]/g,''),10));
  const list = [];
  for (const k of keys) {
    const info = latestShotsMap[k];
    const parts = info.path.split("/");
    const encodedParts = parts.map(p => encodeURIComponent(p));
    const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/${bucketName}/${encodedParts.join("/")}`;
    list.push({ shot: k, url: publicUrl, path: info.path, version: info.version, fileName: info.fileName });
  }
  return list;
}

function createScenePlayerWithOverlay(){
  scenePlayerWrap.innerHTML = "";
  sceneVideoEl = document.createElement("video");
  sceneVideoEl.controls = true;
  sceneVideoEl.width = 900;
  sceneVideoEl.style.maxWidth = "100%";
  sceneVideoEl.setAttribute("playsinline","");
  sceneVideoEl.setAttribute("preload","auto");

  const wrap = document.createElement("div");
  wrap.className = "sceneCanvasWrap";
  wrap.style.position = "relative";

  overlayCanvas = document.createElement("canvas");
  overlayCanvas.style.position = "absolute";
  overlayCanvas.style.left = "0";
  overlayCanvas.style.top = "0";
  overlayCanvas.style.pointerEvents = "none";
  overlayCanvas.style.zIndex = 2;

  overlayCtx = overlayCanvas.getContext("2d");
  overlayCtx.lineCap = "round";

  wrap.appendChild(sceneVideoEl);
  wrap.appendChild(overlayCanvas);
  scenePlayerWrap.appendChild(wrap);

  function resizeCanvasToVideo(){
    const canvasW = Math.max(1, Math.round(sceneVideoEl.clientWidth));
    const canvasH = Math.max(1, Math.round(sceneVideoEl.clientHeight));
    overlayCanvas.width = canvasW;
    overlayCanvas.height = canvasH;
    overlayCanvas.style.width = canvasW + "px";
    overlayCanvas.style.height = canvasH + "px";
  }

  sceneVideoEl.addEventListener("loadedmetadata", resizeCanvasToVideo);
  window.addEventListener("resize", resizeCanvasToVideo);

  // pointer drawing
  let isDrawing = false;
  let lastX = 0, lastY = 0;

  overlayCanvas.addEventListener("pointerdown", (e) => {
    if (!drawActive) return;
    isDrawing = true;
    overlayCtx.strokeStyle = colorPicker.value;
    overlayCtx.lineWidth = parseInt(brushSize.value,10);
    const rect = overlayCanvas.getBoundingClientRect();
    lastX = (e.clientX - rect.left) * (overlayCanvas.width / rect.width);
    lastY = (e.clientY - rect.top) * (overlayCanvas.height / rect.height);
    overlayCtx.beginPath();
    overlayCtx.moveTo(lastX, lastY);
    overlayCanvas.setPointerCapture(e.pointerId);
  });

  overlayCanvas.addEventListener("pointermove", (e) => {
    if (!isDrawing) return;
    const rect = overlayCanvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (overlayCanvas.width / rect.width);
    const y = (e.clientY - rect.top) * (overlayCanvas.height / rect.height);
    overlayCtx.lineTo(x, y);
    overlayCtx.stroke();
    lastX = x; lastY = y;
  });

  overlayCanvas.addEventListener("pointerup", (e) => {
    if (!isDrawing) return;
    isDrawing = false;
    try { overlayCanvas.releasePointerCapture(e.pointerId); } catch(e){}
  });

  overlayCanvas.addEventListener("pointercancel", ()=> { isDrawing = false; });

  sceneVideoEl.addEventListener("ended", () => sceneNext());

  return sceneVideoEl;
}

/* ---------- Frame annotation saving / loading ---------- */
async function saveFrameAnnotation(){
  if (!currentAnnotationShot || currentAnnotationVersion == null) { alert("Nenhum shot ativo."); return; }
  if (!overlayCanvas) { alert("Crie o player primeiro (Play Scene)."); return; }
  try {
    const ms = Math.round(sceneVideoEl.currentTime * 1000);
    const blob = await new Promise(res => overlayCanvas.toBlob(res, "image/png"));
    const remotePath = `annotations/${currentAnnotationShot}/frames/${currentAnnotationShot}_v${String(currentAnnotationVersion).padStart(3,"0")}_t${ms}.png`;
    const { data, error } = await client.storage.from(bucketName).upload(remotePath, blob, { upsert: true });
    if (error) { console.error("saveFrame error", error); alert("Erro ao salvar anotação de frame: " + (error.message||JSON.stringify(error))); return; }
    alert("Anotação do frame salva.");
    // after save, reload comments/list if needed
  } catch (e) { console.error(e); alert("Erro ao salvar anotação."); }
}

async function loadClosestFrameAnnotation(shot, version){
  if (!overlayCanvas || !overlayCtx) return;
  // clear canvas
  overlayCtx.clearRect(0,0,overlayCanvas.width, overlayCanvas.height);

  // list files in annotations/<shot>/frames
  try {
    const listPath = `annotations/${shot}/frames`;
    const { data: files, error } = await client.storage.from(bucketName).list(listPath, { limit: 1000 });
    if (error || !files || files.length===0) return;
    // compute current ms
    const nowMs = Math.round(sceneVideoEl.currentTime * 1000);
    // find matching files with pattern ..._v###_t{ms}.png
    let best = null;
    for (const f of files){
      const m = f.name.match(new RegExp(`${shot}_v0*${String(version)}_t(\\d+)\\.png`));
      if (m) {
        const fileMs = parseInt(m[1],10);
        const diff = Math.abs(fileMs - nowMs);
        if (!best || diff < best.diff) best = {file: f.name, diff, ms: fileMs};
      }
    }
    if (!best) return;
    const path = `${listPath}/${best.file}`;
    const url = `${SUPABASE_URL}/storage/v1/object/public/${bucketName}/${encodeURIComponent(path)}`;
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = function(){
      // resize canvas to display size
      overlayCanvas.width = overlayCanvas.clientWidth;
      overlayCanvas.height = overlayCanvas.clientHeight;
      overlayCtx.clearRect(0,0,overlayCanvas.width, overlayCanvas.height);
      overlayCtx.drawImage(img, 0, 0, overlayCanvas.width, overlayCanvas.height);
    };
    img.onerror = ()=>{};
    img.src = url;
  } catch (e) { console.error("loadClosestFrameAnnotation", e); }
}

/* ---------- Full annotation save (as before) ---------- */
async function saveFullAnnotation(){
  if (!currentAnnotationShot || currentAnnotationVersion == null) { alert("Nenhum shot ativo."); return; }
  if (!overlayCanvas) { alert("Crie o player primeiro (Play Scene)."); return; }
  try {
    const blob = await new Promise(res => overlayCanvas.toBlob(res, "image/png"));
    const remotePath = `annotations/${currentAnnotationShot}/${currentAnnotationShot}_v${String(currentAnnotationVersion).padStart(3,"0")}.png`;
    const { data, error } = await client.storage.from(bucketName).upload(remotePath, blob, { upsert: true });
    if (error) { console.error("saveFull error", error); alert("Erro ao salvar anotação: " + (error.message||JSON.stringify(error))); return; }
    alert("Anotação salva (full).");
  } catch (e) { console.error(e); alert("Erro ao salvar anotação."); }
}

/* ---------- Comments (per-shot JSON) ---------- */
async function loadCommentsFor(shot){
  commentsList.innerHTML = "Carregando comentários...";
  const path = `annotations/${shot}/${shot}_comments.json`;
  try {
    const { data, error } = await client.storage.from(bucketName).download(path);
    if (error) { commentsList.innerHTML = "<i>Nenhum comentário.</i>"; return []; }
    const text = await data.text();
    const arr = JSON.parse(text || "[]");
    renderComments(arr);
    return arr;
  } catch (e) { console.error("loadCommentsFor", e); commentsList.innerHTML = "<i>Erro carregando comentários</i>"; return []; }
}

function renderComments(arr){
  if (!arr || arr.length===0) { commentsList.innerHTML = "<i>Nenhum comentário.</i>"; return; }
  // sort by time
  arr.sort((a,b)=>a.time_ms - b.time_ms);
  commentsList.innerHTML = "";
  for (const c of arr) {
    const div = document.createElement("div");
    div.className = "comment";
    const timeStr = new Date(c.created_at).toLocaleString();
    const seconds = (c.time_ms/1000).toFixed(2);
    div.innerHTML = `<time>${seconds}s — ${timeStr}</time><div>${escapeHtml(c.text)}</div>`;
    div.style.cursor = "pointer";
    div.addEventListener("click", ()=> {
      // seek to time
      if (sceneVideoEl) {
        sceneVideoEl.currentTime = c.time_ms/1000;
        sceneVideoEl.play().catch(()=>{});
      }
    });
    commentsList.appendChild(div);
  }
}

function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

async function addCommentAtCurrentTime(){
  if (!currentAnnotationShot) { alert("Nenhum shot ativo."); return; }
  const text = commentInput.value.trim();
  if (!text) { alert("Digite um comentário."); return; }
  const path = `annotations/${currentAnnotationShot}/${currentAnnotationShot}_comments.json`;
  try {
    // read existing
    let existing = [];
    const { data: dl, error: de } = await client.storage.from(bucketName).download(path);
    if (!de) {
      const t = await dl.text();
      existing = JSON.parse(t || "[]");
    }
    const obj = { time_ms: Math.round(sceneVideoEl.currentTime*1000), text, created_at: new Date().toISOString() };
    existing.push(obj);
    const blob = new Blob([JSON.stringify(existing, null, 2)], { type: "application/json" });
    const { data, error } = await client.storage.from(bucketName).upload(path, blob, { upsert: true });
    if (error) { console.error("save comment error", error); alert("Erro ao salvar comentário: "+(error.message||JSON.stringify(error))); return; }
    commentInput.value = "";
    await loadCommentsFor(currentAnnotationShot);
  } catch (e) { console.error("addCommentAtCurrentTime", e); alert("Erro ao salvar comentário."); }
}

/* ---------- Scene functions (play/next/prev etc) ---------- */
function createOrGetSceneVideo(){ if (sceneVideoEl) return sceneVideoEl; return createScenePlayerWithOverlay(); }

async function playSceneFrom(index=0){
  if (!latestShotsMap || Object.keys(latestShotsMap).length === 0) { alert("Não há shots para tocar."); return; }
  scenePlaylist = buildPlaylistFromLatestShots();
  if (scenePlaylist.length === 0) { alert("Playlist vazia."); return; }
  sceneIndex = Math.max(0, Math.min(index, scenePlaylist.length-1));
  const item = scenePlaylist[sceneIndex];
  const vid = createOrGetSceneVideo();
  currentAnnotationShot = item.shot;
  currentAnnotationVersion = item.version;
  // load frame annotation closest
  await loadCommentsFor(currentAnnotationShot);
  await loadClosestFrameAnnotation(currentAnnotationShot, currentAnnotationVersion);
  vid.src = item.url;
  currentShotLabel.textContent = `${item.shot} (${sceneIndex+1}/${scenePlaylist.length})`;
  try { await vid.play(); } catch(e) { console.warn("autoplay blocked", e); }
}

function scenePause(){ if (sceneVideoEl) sceneVideoEl.pause(); }
function sceneNext(){
  if (!scenePlaylist || scenePlaylist.length === 0) return;
  sceneIndex = Math.min(sceneIndex+1, scenePlaylist.length-1);
  const item = scenePlaylist[sceneIndex];
  currentAnnotationShot = item.shot;
  currentAnnotationVersion = item.version;
  loadCommentsFor(currentAnnotationShot);
  loadClosestFrameAnnotation(currentAnnotationShot, currentAnnotationVersion);
  if (!sceneVideoEl) createOrGetSceneVideo();
  sceneVideoEl.src = item.url;
  currentShotLabel.textContent = `${item.shot} (${sceneIndex+1}/${scenePlaylist.length})`;
  sceneVideoEl.play().catch(()=>{});
}
function scenePrev(){
  if (!scenePlaylist || scenePlaylist.length === 0) return;
  sceneIndex = Math.max(sceneIndex-1, 0);
  const item = scenePlaylist[sceneIndex];
  currentAnnotationShot = item.shot;
  currentAnnotationVersion = item.version;
  loadCommentsFor(currentAnnotationShot);
  loadClosestFrameAnnotation(currentAnnotationShot, currentAnnotationVersion);
  if (!sceneVideoEl) createOrGetSceneVideo();
  sceneVideoEl.src = item.url;
  currentShotLabel.textContent = `${item.shot} (${sceneIndex+1}/${scenePlaylist.length})`;
  sceneVideoEl.play().catch(()=>{});
}
function stopScene(){
  if (sceneVideoEl) { sceneVideoEl.pause(); sceneVideoEl.currentTime=0; sceneVideoEl.src=""; }
  scenePlaylist=[]; sceneIndex=0; currentShotLabel.textContent="";
}

/* ---------- Draw UI handlers ---------- */
btnToggleDraw.addEventListener("click", ()=> {
  drawActive = !drawActive;
  if (!overlayCanvas) createOrGetSceneVideo();
  overlayCanvas.style.pointerEvents = drawActive ? "auto" : "none";
  btnToggleDraw.textContent = drawActive ? "Drawing: ON" : "Draw";
});
btnClearDraw.addEventListener("click", ()=> { if (!overlayCtx) return; overlayCtx.clearRect(0,0,overlayCanvas.width, overlayCanvas.height); });
btnSaveFrame.addEventListener("click", ()=> saveFrameAnnotation());
btnSaveFull.addEventListener("click", ()=> saveFullAnnotation());
btnToggleOverlay.addEventListener("click", ()=> { overlayVisible = !overlayVisible; if (overlayCanvas) overlayCanvas.style.display = overlayVisible ? "block" : "none"; btnToggleOverlay.textContent = overlayVisible ? "Toggle Overlay" : "Overlay Hidden"; });

btnScenePlay.addEventListener("click", async ()=> { if (!sceneVideoEl) { await loadShots(); playSceneFrom(sceneIndex || 0); } else sceneVideoEl.play().catch(()=>{}); });
btnScenePause.addEventListener("click", ()=> scenePause());
btnSceneNext.addEventListener("click", ()=> sceneNext());
btnScenePrev.addEventListener("click", ()=> scenePrev());
