<html>
<head>

body{

<body>

<h1>Animation Shot Review</h1>

<h2>Upload Shot</h2>

<input type="file" id="fileInput">
<button onclick="upload()">Upload</button>

<h2>Shots</h2>

<div id="shots"></div>

<script>

const SUPABASE_URL = "https://qdnmeuxojubkijpcesry.supabase.co"
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkbm1ldXhvanVia2lqcGNlc3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNzM2NTAsImV4cCI6MjA4ODc0OTY1MH0.UBnWHTKw3Pw2pMgRHvpReg7sLMHwvGm5EU2kqq8990A"

const supabase = window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

async function upload(){

let file = document.getElementById("fileInput").files[0]

if(!file){
alert("Select a file")
return
}

let name = file.name

let shotMatch = name.match(/sh_(\d+)/)
let versionMatch = name.match(/v(\d+)/)

let shot = shotMatch ? shotMatch[1] : "unknown"
let version = versionMatch ? versionMatch[1] : "1"

let path = `${shot}/${name}`

let {data,error} = await supabase.storage
.from("videos")
.upload(path,file,{upsert:true})

if(error){
alert("Upload error")
console.log(error)
return
}

loadShots()

}

async function loadShots(){

let {data,error} = await supabase.storage
.from("videos")
.list("",{limit:100})

let div = document.getElementById("shots")

div.innerHTML=""

for(let folder of data){

let {data:files} = await supabase.storage
.from("videos")
.list(folder.name)

for(let file of files){

let url = `${SUPABASE_URL}/storage/v1/object/public/videos/${folder.name}/${file.name}`

let shot = folder.name

div.innerHTML += `<h3>Shot ${shot}</h3>`

let video = document.createElement("video")

video.src = url
video.controls = true
video.width = 400

div.appendChild(video)

}

}

}

loadShots()

</script>

</body>
</html>
