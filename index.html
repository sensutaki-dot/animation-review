<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AnimReview — Shot Review Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ─── RESET & BASE ─────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #0c0d0f;
    --bg2:       #141518;
    --bg3:       #1c1e23;
    --border:    #2a2d35;
    --border2:   #373b47;
    --text:      #e2e4ea;
    --muted:     #6b7080;
    --accent:    #f5a623;
    --accent2:   #e87c1e;
    --green:     #3ecf8e;
    --red:       #f25c5c;
    --blue:      #4f8cff;
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'IBM Plex Sans', sans-serif;
    --radius:    6px;
    --sidebar:   280px;
  }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 13px; }

  /* ─── LAYOUT ────────────────────────────────────────────────── */
  #app { display: grid; grid-template-columns: var(--sidebar) 1fr; grid-template-rows: 48px 1fr; height: 100vh; }
  #topbar { grid-column: 1 / -1; display: flex; align-items: center; gap: 16px; padding: 0 20px; background: var(--bg2); border-bottom: 1px solid var(--border); z-index: 10; }
  #sidebar { background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  #main { display: flex; flex-direction: column; overflow: hidden; }

  /* ─── TOPBAR ────────────────────────────────────────────────── */
  .logo { font-family: var(--mono); font-weight: 600; font-size: 14px; color: var(--accent); letter-spacing: 0.05em; flex-shrink: 0; }
  .logo span { color: var(--muted); }
  .topbar-spacer { flex: 1; }
  #scene-label { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  #btn-play-scene, #btn-export { padding: 7px 16px; border-radius: var(--radius); border: none; cursor: pointer; font-family: var(--mono); font-size: 12px; font-weight: 500; transition: all .15s; }
  #btn-play-scene { background: var(--bg3); color: var(--text); border: 1px solid var(--border2); }
  #btn-play-scene:hover { background: var(--border2); }
  #btn-export { background: var(--accent); color: #000; }
  #btn-export:hover { background: var(--accent2); }
  #upload-btn-wrap { position: relative; }
  #upload-btn-wrap input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .btn-upload { padding: 7px 14px; border-radius: var(--radius); background: var(--bg3); border: 1px solid var(--border2); color: var(--text); font-family: var(--mono); font-size: 12px; cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 6px; }
  .btn-upload:hover { background: var(--border2); }
  #upload-progress { display: none; align-items: center; gap: 8px; font-family: var(--mono); font-size: 11px; color: var(--accent); }
  .spinner { width: 12px; height: 12px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── SIDEBAR ────────────────────────────────────────────────── */
  .sidebar-header { padding: 12px 14px 8px; font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  #shot-list { flex: 1; overflow-y: auto; padding: 6px; }
  #shot-list::-webkit-scrollbar { width: 4px; }
  #shot-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
  .shot-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius); cursor: pointer; transition: background .12s; border: 1px solid transparent; margin-bottom: 3px; }
  .shot-item:hover { background: var(--bg3); }
  .shot-item.active { background: var(--bg3); border-color: var(--accent); }
  .shot-thumb { width: 52px; height: 30px; object-fit: cover; border-radius: 3px; background: var(--bg3); flex-shrink: 0; border: 1px solid var(--border); }
  .shot-thumb-placeholder { width: 52px; height: 30px; flex-shrink: 0; background: var(--bg3); border-radius: 3px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--border2); font-size: 16px; }
  .shot-info { flex: 1; min-width: 0; }
  .shot-name { font-family: var(--mono); font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .shot-version { font-family: var(--mono); font-size: 10px; color: var(--green); margin-top: 2px; }
  .shot-comment-count { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 1px; }
  .sidebar-footer { padding: 10px 14px; border-top: 1px solid var(--border); font-family: var(--mono); font-size: 10px; color: var(--muted); }

  /* ─── PLAYER AREA ──────────────────────────────────────────── */
  #player-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #000; position: relative; }
  #player-wrap { position: relative; flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #000; }
  #player-wrap video { max-width: 100%; max-height: 100%; display: block; }
  #draw-canvas { position: absolute; top: 0; left: 0; cursor: crosshair; display: none; touch-action: none; }
  #player-wrap.draw-mode #draw-canvas { display: block; }
  .no-shot-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--muted); flex: 1; }
  .no-shot-placeholder .icon { font-size: 48px; opacity: .3; }

  /* ─── CONTROLS BAR ──────────────────────────────────────────── */
  #controls-bar { background: var(--bg2); border-top: 1px solid var(--border); padding: 0 16px; display: flex; flex-direction: column; gap: 0; }

  /* ─── TIMELINE ───────────────────────────────────────────────── */
  #timeline-outer { padding: 10px 0 4px; user-select: none; }

  /* Ruler (tick marks + labels) */
  #timeline-ruler { position: relative; height: 16px; margin-bottom: 4px; pointer-events: none; }
  .ruler-tick { position: absolute; bottom: 0; width: 1px; background: var(--border2); }
  .ruler-tick.major { background: var(--border2); height: 8px; }
  .ruler-tick.minor { height: 4px; opacity: .5; }
  .ruler-label { position: absolute; bottom: 9px; transform: translateX(-50%); font-family: var(--mono); font-size: 9px; color: var(--muted); white-space: nowrap; }

  /* Track */
  #timeline-wrap { position: relative; height: 28px; cursor: pointer; display: flex; align-items: center; }
  #timeline-track { width: 100%; height: 6px; background: var(--bg3); border-radius: 3px; position: relative; overflow: visible; }
  #timeline-buffered { position: absolute; top: 0; left: 0; height: 100%; background: rgba(255,255,255,.08); border-radius: 3px; pointer-events: none; width: 0%; }
  #timeline-fill { position: absolute; top: 0; left: 0; height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 3px; width: 0%; pointer-events: none; }
  #timeline-thumb {
    position: absolute; top: 50%; left: 0%;
    transform: translate(-50%, -50%);
    width: 14px; height: 14px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 0 3px var(--accent), 0 2px 6px rgba(0,0,0,.6);
    pointer-events: none;
    transition: transform .08s, box-shadow .08s;
    z-index: 4;
  }
  #timeline-wrap:hover #timeline-thumb { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 0 3px var(--accent), 0 0 12px rgba(245,166,35,.5); }

  /* Comment markers — diamond shape above the track */
  .comment-marker {
    position: absolute;
    top: -10px;
    transform: translateX(-50%) rotate(45deg);
    width: 9px; height: 9px;
    background: var(--blue);
    border: 1.5px solid rgba(255,255,255,.25);
    cursor: pointer;
    z-index: 3;
    transition: transform .1s, background .1s;
    border-radius: 2px;
  }
  .comment-marker:hover { transform: translateX(-50%) rotate(45deg) scale(1.4); background: #7eb8ff; }

  /* Hover tooltip */
  #timeline-tooltip {
    position: absolute; top: -28px; transform: translateX(-50%);
    background: var(--bg3); border: 1px solid var(--border2);
    color: var(--text); font-family: var(--mono); font-size: 10px;
    padding: 3px 7px; border-radius: 4px; pointer-events: none;
    opacity: 0; transition: opacity .1s; white-space: nowrap; z-index: 10;
  }
  #timeline-wrap:hover #timeline-tooltip { opacity: 1; }

  /* Playback buttons */
  #playback-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; }
  .ctrl-btn { width: 36px; height: 36px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg3); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all .12s; flex-shrink: 0; }
  .ctrl-btn:hover { background: var(--border2); }
  .ctrl-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
  #btn-play-pause { width: 44px; height: 44px; font-size: 18px; background: var(--accent); color: #000; border-color: var(--accent); }
  #btn-play-pause:hover { background: var(--accent2); }
  #timecode { font-family: var(--mono); font-size: 13px; color: var(--text); min-width: 110px; }
  .playback-spacer { flex: 1; }
  #volume-wrap { display: flex; align-items: center; gap: 6px; }
  #volume-wrap input[type=range] { width: 70px; accent-color: var(--accent); cursor: pointer; }
  #speed-select { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); font-family: var(--mono); font-size: 11px; padding: 4px 6px; border-radius: var(--radius); cursor: pointer; }

  /* Draw toolbar */
  #draw-toolbar { display: none; align-items: center; gap: 8px; padding: 6px 0; border-top: 1px solid var(--border); }
  #draw-toolbar.visible { display: flex; }
  .color-swatch { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color .1s; flex-shrink: 0; }
  .color-swatch.selected { border-color: #fff; }
  #brush-size { width: 60px; accent-color: var(--accent); }
  .draw-sep { width: 1px; height: 20px; background: var(--border); }
  #btn-clear-canvas { font-family: var(--mono); font-size: 11px; padding: 4px 10px; background: var(--bg3); border: 1px solid var(--border2); color: var(--muted); border-radius: var(--radius); cursor: pointer; }
  #btn-clear-canvas:hover { color: var(--red); border-color: var(--red); }
  #btn-save-frame { font-family: var(--mono); font-size: 11px; padding: 4px 10px; background: var(--green); border: 1px solid var(--green); color: #000; border-radius: var(--radius); cursor: pointer; font-weight: 500; }

  /* ─── RIGHT PANEL (Comments) ──────────────────────────────── */
  #right-panel { width: 300px; border-left: 1px solid var(--border); background: var(--bg2); display: flex; flex-direction: column; overflow: hidden; }
  #main-content { display: flex; flex: 1; overflow: hidden; }

  .panel-header { padding: 12px 14px; font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .panel-header span.count { background: var(--bg3); border-radius: 10px; padding: 2px 7px; font-size: 10px; color: var(--text); }

  #comments-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
  #comments-list::-webkit-scrollbar { width: 4px; }
  #comments-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .comment-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; cursor: pointer; transition: border-color .12s; }
  .comment-card:hover { border-color: var(--border2); }
  .comment-card.highlight { border-color: var(--blue); }
  .comment-tc { font-family: var(--mono); font-size: 11px; color: var(--blue); margin-bottom: 5px; display: flex; align-items: center; gap: 6px; }
  .comment-tc::before { content: ''; display: block; width: 6px; height: 6px; border-radius: 50%; background: var(--blue); flex-shrink: 0; }
  .comment-text { font-size: 12px; line-height: 1.5; color: var(--text); word-break: break-word; }
  .comment-actions { display: none; gap: 6px; margin-top: 8px; }
  .comment-card:hover .comment-actions { display: flex; }
  .comment-actions button { font-family: var(--mono); font-size: 10px; padding: 3px 8px; border-radius: 3px; border: 1px solid var(--border2); background: transparent; cursor: pointer; color: var(--muted); transition: all .12s; }
  .comment-actions .btn-edit { color: var(--text); }
  .comment-actions .btn-edit:hover { background: var(--bg); }
  .comment-actions .btn-del { color: var(--red); border-color: transparent; }
  .comment-actions .btn-del:hover { background: rgba(242,92,92,.1); border-color: var(--red); }

  #comment-input-wrap { padding: 10px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
  #comment-tc-display { font-family: var(--mono); font-size: 11px; color: var(--blue); }
  #comment-input { width: 100%; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); border-radius: var(--radius); padding: 8px 10px; font-family: var(--sans); font-size: 12px; resize: none; height: 60px; transition: border-color .12s; }
  #comment-input:focus { outline: none; border-color: var(--accent); }
  #btn-add-comment { width: 100%; padding: 8px; background: var(--accent); color: #000; border: none; border-radius: var(--radius); font-family: var(--mono); font-size: 12px; font-weight: 600; cursor: pointer; transition: background .12s; }
  #btn-add-comment:hover { background: var(--accent2); }

  /* ─── TOAST ─────────────────────────────────────────────────── */
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--bg2); border: 1px solid var(--border2); color: var(--text); font-family: var(--mono); font-size: 12px; padding: 10px 20px; border-radius: 20px; opacity: 0; pointer-events: none; transition: all .25s; z-index: 999; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.ok { border-color: var(--green); color: var(--green); }
  #toast.err { border-color: var(--red); color: var(--red); }

  /* ─── MODAL ─────────────────────────────────────────────────── */
  #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: center; justify-content: center; }
  #modal-overlay.open { display: flex; }
  .modal-box { background: var(--bg2); border: 1px solid var(--border2); border-radius: 10px; padding: 24px; width: 380px; }
  .modal-box h3 { font-family: var(--mono); font-size: 14px; margin-bottom: 16px; }
  .modal-box input, .modal-box textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); border-radius: var(--radius); padding: 8px 10px; font-family: var(--sans); font-size: 13px; margin-bottom: 10px; }
  .modal-box input:focus, .modal-box textarea:focus { outline: none; border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
  .modal-actions button { padding: 7px 16px; border-radius: var(--radius); font-family: var(--mono); font-size: 12px; cursor: pointer; border: 1px solid var(--border2); }
  .btn-cancel { background: transparent; color: var(--muted); }
  .btn-confirm { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
  .btn-cancel:hover { color: var(--text); }

  /* ─── SCROLLBAR GLOBAL ───────────────────────────────────────── */
  * { scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
</style>
</head>
<body>

<div id="app">

  <!-- TOPBAR -->
  <header id="topbar">
    <div class="logo">ANIM<span>/</span>REVIEW</div>
    <div id="upload-btn-wrap">
      <label class="btn-upload">⬆ Upload Shot<input type="file" id="file-input" accept="video/*" multiple /></label>
    </div>
    <div id="upload-progress"><div class="spinner"></div><span id="upload-label">Uploading…</span></div>
    <div class="topbar-spacer"></div>
    <div id="scene-label">— no scene —</div>
    <button id="btn-play-scene">▶ Play Scene</button>
    <button id="btn-export">⬇ Export Scene</button>
  </header>

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-header">
      Shots
      <span id="shot-count" style="color:var(--text)">0</span>
    </div>
    <div id="shot-list"><div style="padding:20px 14px;color:var(--muted);font-family:var(--mono);font-size:11px;">No shots yet.<br>Upload a file like<br><b style="color:var(--text)">sh_01_v001.mp4</b></div></div>
    <div class="sidebar-footer" id="sidebar-footer"></div>
  </aside>

  <!-- MAIN -->
  <main id="main">
    <div id="main-content">

      <!-- PLAYER + CONTROLS -->
      <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
        <div id="player-area">
          <div id="player-wrap">
            <div class="no-shot-placeholder" id="placeholder">
              <div class="icon">🎬</div>
              <div style="font-family:var(--mono);font-size:12px;">Select a shot to begin review</div>
            </div>
            <video id="video" style="display:none;" preload="auto"></video>
            <video id="video-preload" style="display:none;position:absolute;pointer-events:none;" preload="auto" muted></video>
            <canvas id="draw-canvas"></canvas>
          </div>
        </div>

        <div id="controls-bar">
          <!-- Timeline -->
          <div id="timeline-outer">
            <div id="timeline-ruler"></div>
            <div id="timeline-wrap">
              <div id="timeline-track">
                <div id="timeline-buffered"></div>
                <div id="timeline-fill"></div>
                <div id="comment-markers"></div>
                <div id="timeline-thumb"></div>
              </div>
              <div id="timeline-tooltip">00:00</div>
            </div>
          </div>

          <!-- Playback row -->
          <div id="playback-row">
            <button class="ctrl-btn" id="btn-prev-shot" title="Previous Shot">⏮</button>
            <button class="ctrl-btn" id="btn-step-back" title="Step -1s">◀</button>
            <button class="ctrl-btn" id="btn-play-pause">▶</button>
            <button class="ctrl-btn" id="btn-step-fwd" title="Step +1s">▶</button>
            <button class="ctrl-btn" id="btn-next-shot" title="Next Shot">⏭</button>
            <div id="timecode" class="mono">00:00 / 00:00</div>
            <div class="playback-spacer"></div>
            <div id="volume-wrap">🔊 <input type="range" id="volume" min="0" max="1" step="0.05" value="1" /></div>
            <select id="speed-select">
              <option value="0.25">0.25×</option>
              <option value="0.5">0.5×</option>
              <option value="1" selected>1×</option>
              <option value="1.5">1.5×</option>
              <option value="2">2×</option>
            </select>
            <button class="ctrl-btn" id="btn-draw" title="Toggle Draw Mode">✏️</button>
            <button class="ctrl-btn" id="btn-fullscreen" title="Fullscreen">⛶</button>
          </div>

          <!-- Draw toolbar -->
          <div id="draw-toolbar">
            <div class="color-swatch selected" style="background:#f5a623" data-color="#f5a623"></div>
            <div class="color-swatch" style="background:#f25c5c" data-color="#f25c5c"></div>
            <div class="color-swatch" style="background:#4f8cff" data-color="#4f8cff"></div>
            <div class="color-swatch" style="background:#3ecf8e" data-color="#3ecf8e"></div>
            <div class="color-swatch" style="background:#fff" data-color="#fff"></div>
            <div class="draw-sep"></div>
            <input type="range" id="brush-size" min="2" max="24" value="4" title="Brush size" />
            <div class="draw-sep"></div>
            <button id="btn-clear-canvas">Clear</button>
            <button id="btn-save-frame">Save Frame ✓</button>
          </div>
        </div>
      </div>

      <!-- RIGHT PANEL -->
      <div id="right-panel">
        <div class="panel-header">Comments <span class="count" id="comment-count">0</span></div>
        <div id="comments-list"></div>
        <div id="comment-input-wrap">
          <div id="comment-tc-display">@ 00:00</div>
          <textarea id="comment-input" placeholder="Add a comment at this frame…"></textarea>
          <button id="btn-add-comment">Add Comment</button>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div class="modal-box">
    <h3 id="modal-title">Edit Comment</h3>
    <textarea id="modal-input" rows="3" style="resize:none;height:80px;"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-confirm" id="modal-confirm">Save</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ─── CONFIG — substitua com suas credenciais do Supabase ──────────────────
const SUPABASE_URL    = "https://qdnmeuxojubkijpcesry.supabase.co";
const SUPABASE_ANON   = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkbm1ldXhvanVia2lqcGNlc3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNzM2NTAsImV4cCI6MjA4ODc0OTY1MH0.UBnWHTKw3Pw2pMgRHvpReg7sLMHwvGm5EU2kqq8990A";
const BUCKET          = "videos";
const EXPORT_SERVICE  = "https://SEU_SERVICO/export-scene"; // URL do container (preencher depois)
// ─────────────────────────────────────────────────────────────────────────

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ─── STATE ────────────────────────────────────────────────────────────────
let shots = {};       // { shotKey: { version, path, fileName, url } }
let shotOrder = [];   // sorted shot keys
let currentShot = null;
let isSceneMode = false;
let sceneIdx = 0;
let drawMode = false;
let drawColor = "#f5a623";
let drawSize = 4;
let isDrawing = false;
let lastX = 0, lastY = 0;
let annotations = {};   // { shotKey: { full: dataURL, frames: { "1.23": dataURL } } }
let comments = {};      // { shotKey: [ {time, text, id} ] }
let editingCommentId = null;

// ─── DOM refs ─────────────────────────────────────────────────────────────
const video          = document.getElementById("video");
const videoPreload   = document.getElementById("video-preload");
const canvas         = document.getElementById("draw-canvas");
const ctx            = canvas.getContext("2d");
const playerWrap     = document.getElementById("player-wrap");
const placeholder    = document.getElementById("placeholder");
const timelineFill   = document.getElementById("timeline-fill");
const timelineThumb  = document.getElementById("timeline-thumb");
const timelineWrap   = document.getElementById("timeline-wrap");
const timelineBuffer = document.getElementById("timeline-buffered");
const timelineRuler  = document.getElementById("timeline-ruler");
const timelineTip    = document.getElementById("timeline-tooltip");
const commentMarkers = document.getElementById("comment-markers");
const timecodeEl     = document.getElementById("timecode");
const commentTcEl    = document.getElementById("comment-tc-display");
const commentsList   = document.getElementById("comments-list");
const commentCount   = document.getElementById("comment-count");
const commentInput   = document.getElementById("comment-input");
const shotList       = document.getElementById("shot-list");
const shotCountEl    = document.getElementById("shot-count");
const sceneLabel     = document.getElementById("scene-label");
const sidebarFooter  = document.getElementById("sidebar-footer");
const uploadProgress = document.getElementById("upload-progress");
const uploadLabel    = document.getElementById("upload-label");
const drawToolbar    = document.getElementById("draw-toolbar");
const toast          = document.getElementById("toast");
const modalOverlay   = document.getElementById("modal-overlay");

// ─── HELPERS ──────────────────────────────────────────────────────────────
function fmt(t) {
  if (!isFinite(t)) return "00:00";
  const m = Math.floor(t / 60), s = Math.floor(t % 60);
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

let toastTimer;
function showToast(msg, type = "") {
  toast.textContent = msg;
  toast.className = "show " + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toast.className = ""; }, 2800);
}

function parseShot(filename, fullPath) {
  const shotMatch = filename.match(/(sh[_-]?\d+)/i) || fullPath.match(/^(sh[_-]?\d+)/i);
  const verMatch  = filename.match(/_v0*(\d+)/i) || filename.match(/v0*(\d+)/i);
  if (!shotMatch || !verMatch) return null;
  return {
    shotKey: shotMatch[1].toUpperCase().replace(/[_-]/, ""),
    version: parseInt(verMatch[1], 10),
  };
}

function publicUrl(path) {
  return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${path.split("/").map(encodeURIComponent).join("/")}`;
}

// ─── LOAD SHOTS FROM SUPABASE ─────────────────────────────────────────────
async function loadShots() {
  const { data, error } = await sb.storage.from(BUCKET).list("", { limit: 500 });
  if (error) { showToast("Failed to load shots: " + error.message, "err"); return; }

  shots = {};
  for (const entry of data) {
    const name = entry.name;
    if (/\.(mov|mp4|m4v|webm)$/i.test(name)) {
      processEntry(name, name);
    } else if (entry.metadata == null) {
      // It's a folder
      const { data: inner } = await sb.storage.from(BUCKET).list(name, { limit: 500 });
      if (inner) inner.forEach(f => processEntry(f.name, `${name}/${f.name}`));
    }
  }

  shotOrder = Object.keys(shots).sort((a, b) =>
    parseInt(a.replace(/\D/g,"") || 0) - parseInt(b.replace(/\D/g,"") || 0)
  );
  renderShotList();
}

function processEntry(filename, path) {
  if (!/\.(mov|mp4|m4v|webm)$/i.test(filename)) return;
  const parsed = parseShot(filename, path);
  if (!parsed) return;
  const { shotKey, version } = parsed;
  if (!shots[shotKey] || shots[shotKey].version < version) {
    shots[shotKey] = { version, path, fileName: filename, url: publicUrl(path) };
  }
}

// ─── RENDER SHOT LIST ─────────────────────────────────────────────────────
function renderShotList() {
  shotCountEl.textContent = shotOrder.length;
  sceneLabel.textContent = shotOrder.length ? `Scene — ${shotOrder.length} shot${shotOrder.length > 1 ? "s" : ""}` : "— no scene —";

  if (!shotOrder.length) {
    shotList.innerHTML = `<div style="padding:20px 14px;color:var(--muted);font-family:var(--mono);font-size:11px;">No shots yet.<br>Upload a file like<br><b style="color:var(--text)">sh_01_v001.mp4</b></div>`;
    return;
  }

  shotList.innerHTML = "";
  shotOrder.forEach(key => {
    const s = shots[key];
    const coms = comments[key] || [];
    const item = document.createElement("div");
    item.className = "shot-item" + (key === currentShot ? " active" : "");
    item.dataset.key = key;

    const thumb = document.createElement("div");
    thumb.className = "shot-thumb-placeholder";
    thumb.textContent = "🎥";
    thumb.style.fontSize = "14px";

    const info = document.createElement("div");
    info.className = "shot-info";
    info.innerHTML = `<div class="shot-name">${key}</div><div class="shot-version">v${String(s.version).padStart(3,"0")}</div>${coms.length ? `<div class="shot-comment-count">💬 ${coms.length}</div>` : ""}`;

    item.appendChild(thumb);
    item.appendChild(info);
    item.addEventListener("click", () => loadShot(key));
    shotList.appendChild(item);
  });
}

// ─── LOAD A SHOT ─────────────────────────────────────────────────────────
async function loadShot(key) {
  if (!shots[key]) return;
  currentShot = key;
  isSceneMode = false;

  placeholder.style.display = "none";
  video.style.display = "block";
  video.src = shots[key].url;
  video.load();

  await loadAnnotations(key);
  await loadComments(key);

  renderShotList();
  renderComments();
  updateTimecode();
  updateCommentTc();
  renderMarkers();
}

// ─── VIDEO EVENTS ────────────────────────────────────────────────────────
video.addEventListener("timeupdate", () => {
  updateTimeline();
  updateTimecode();
  updateCommentTc();
  syncCanvasAnnotation();
});

video.addEventListener("loadedmetadata", () => {
  sizeCanvas();
  updateTimecode();
});

video.addEventListener("play",  updatePlayBtn);
video.addEventListener("pause", updatePlayBtn);

function updateCommentTc() {
  commentTcEl.textContent = `@ ${fmt(video.currentTime)}`;
}

function updatePlayBtn() {
  document.getElementById("btn-play-pause").textContent = video.paused ? "▶" : "⏸";
}

function updateTimecode() {
  timecodeEl.textContent = `${fmt(video.currentTime)} / ${fmt(video.duration)}`;
}

function updateTimeline() {
  const pct = video.duration ? (video.currentTime / video.duration) * 100 : 0;
  timelineFill.style.width = pct + "%";
  timelineThumb.style.left = pct + "%";
  // buffered
  if (video.buffered.length > 0 && video.duration) {
    const bEnd = video.buffered.end(video.buffered.length - 1);
    timelineBuffer.style.width = (bEnd / video.duration * 100) + "%";
  }
}

// ─── RULER ────────────────────────────────────────────────────────────────
function buildRuler() {
  timelineRuler.innerHTML = "";
  const dur = video.duration;
  if (!dur || !isFinite(dur)) return;
  const w = timelineRuler.getBoundingClientRect().width;
  if (!w) return;

  // Choose interval: aim for ~60-80px between major ticks
  const intervals = [1, 2, 5, 10, 15, 30, 60, 120, 300];
  let interval = intervals.find(i => (i / dur) * w >= 55) || 300;
  const minorInterval = interval <= 5 ? 1 : interval <= 30 ? 5 : 10;

  for (let t = 0; t <= dur; t += minorInterval) {
    const pct = (t / dur) * 100;
    const isMajor = t % interval === 0;
    const tick = document.createElement("div");
    tick.className = "ruler-tick " + (isMajor ? "major" : "minor");
    tick.style.left = pct + "%";
    timelineRuler.appendChild(tick);
    if (isMajor) {
      const label = document.createElement("div");
      label.className = "ruler-label";
      label.style.left = pct + "%";
      label.textContent = fmt(t);
      timelineRuler.appendChild(label);
    }
  }
}

video.addEventListener("loadedmetadata", buildRuler);
new ResizeObserver(buildRuler).observe(timelineRuler);

// ─── TIMELINE SCRUB + TOOLTIP ────────────────────────────────────────────
let scrubbing = false;

function scrubTo(e) {
  const rect = timelineWrap.getBoundingClientRect();
  const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
  const pct = x / rect.width;
  // Update tooltip
  if (video.duration) {
    timelineTip.textContent = fmt(pct * video.duration);
    timelineTip.style.left = (pct * 100) + "%";
    if (scrubbing) video.currentTime = pct * video.duration;
  }
}

timelineWrap.addEventListener("mousedown", e => { scrubbing = true; scrubTo(e); video.currentTime = (Math.max(0, Math.min(e.clientX - timelineWrap.getBoundingClientRect().left, timelineWrap.getBoundingClientRect().width)) / timelineWrap.getBoundingClientRect().width) * (video.duration || 0); });
timelineWrap.addEventListener("mousemove", scrubTo);
document.addEventListener("mousemove", e => { if (scrubbing) scrubTo(e); });
document.addEventListener("mouseup", () => { scrubbing = false; });

// ─── MARKERS ─────────────────────────────────────────────────────────────
function renderMarkers() {
  commentMarkers.innerHTML = "";
  if (!currentShot || !video.duration) return;
  (comments[currentShot] || []).forEach(c => {
    const pct = (c.time / video.duration) * 100;
    const m = document.createElement("div");
    m.className = "comment-marker";
    m.style.left = pct + "%";
    m.title = `${fmt(c.time)}: ${c.text.slice(0,40)}`;
    m.addEventListener("click", e => { e.stopPropagation(); video.currentTime = c.time; highlightComment(c.id); });
    commentMarkers.appendChild(m);
  });
}

video.addEventListener("loadedmetadata", renderMarkers);

// ─── CONTROLS ────────────────────────────────────────────────────────────
document.getElementById("btn-play-pause").addEventListener("click", () => {
  video.paused ? video.play() : video.pause();
});
document.getElementById("btn-step-back").addEventListener("click", () => { video.currentTime = Math.max(0, video.currentTime - 1); });
document.getElementById("btn-step-fwd").addEventListener("click",  () => { video.currentTime = Math.min(video.duration || 0, video.currentTime + 1); });
document.getElementById("btn-prev-shot").addEventListener("click", () => prevNextShot(-1));
document.getElementById("btn-next-shot").addEventListener("click", () => prevNextShot(1));
document.getElementById("volume").addEventListener("input", e => { video.volume = e.target.value; });
document.getElementById("speed-select").addEventListener("change", e => { video.playbackRate = parseFloat(e.target.value); });
document.getElementById("btn-fullscreen").addEventListener("click", () => { playerWrap.requestFullscreen?.() || playerWrap.webkitRequestFullscreen?.(); });

function prevNextShot(dir) {
  if (!currentShot) return;
  const idx = shotOrder.indexOf(currentShot);
  const next = shotOrder[idx + dir];
  if (next) loadShot(next);
}

// Keyboard shortcuts
document.addEventListener("keydown", e => {
  if (e.target.tagName === "TEXTAREA" || e.target.tagName === "INPUT") return;
  if (e.code === "Space") { e.preventDefault(); video.paused ? video.play() : video.pause(); }
  if (e.code === "ArrowLeft")  video.currentTime = Math.max(0, video.currentTime - (e.shiftKey ? 5 : 1));
  if (e.code === "ArrowRight") video.currentTime = Math.min(video.duration||0, video.currentTime + (e.shiftKey ? 5 : 1));
  if (e.code === "KeyD") document.getElementById("btn-draw").click();
});

// ─── PLAY SCENE (double-buffer — zero black frame) ───────────────────────
document.getElementById("btn-play-scene").addEventListener("click", () => {
  if (!shotOrder.length) return;
  isSceneMode = true;
  sceneIdx = 0;
  startSceneFrom(0);
});

function startSceneFrom(idx) {
  const key = shotOrder[idx];
  if (!key) return;
  currentShot = key;
  placeholder.style.display = "none";
  video.style.display = "block";
  video.src = shots[key].url;
  video.load();
  video.play().catch(() => {});
  preloadNext(idx + 1);
  loadAnnotations(key).then(() => loadComments(key).then(() => {
    renderShotList(); renderComments(); renderMarkers();
  }));
}

function preloadNext(idx) {
  const key = shotOrder[idx];
  if (!key) { videoPreload.src = ""; return; }
  videoPreload.src = shots[key].url;
  videoPreload.load();
}

// Override the ended handler to use preloaded video (swap src instantly)
video.addEventListener("ended", () => {
  if (isSceneMode) {
    sceneIdx++;
    if (sceneIdx < shotOrder.length) {
      const key = shotOrder[sceneIdx];
      currentShot = key;
      // If preload has same src and is ready, swap instantly
      if (videoPreload.src === shots[key].url && videoPreload.readyState >= 2) {
        video.src = videoPreload.src;
        video.currentTime = 0;
        video.play().catch(() => {});
      } else {
        // fallback — just set src normally
        video.src = shots[key].url;
        video.load();
        video.play().catch(() => {});
      }
      preloadNext(sceneIdx + 1);
      loadAnnotations(key).then(() => loadComments(key).then(() => {
        renderShotList(); renderComments(); renderMarkers();
      }));
    } else {
      isSceneMode = false;
      updatePlayBtn();
    }
  }
  updatePlayBtn();
});

// ─── EXPORT SCENE ────────────────────────────────────────────────────────
document.getElementById("btn-export").addEventListener("click", async () => {
  if (!EXPORT_SERVICE || EXPORT_SERVICE.includes("YOUR_EXPORT")) {
    showToast("Export service URL not configured.", "err"); return;
  }
  showToast("Exporting… this may take a minute.", "");
  try {
    const res = await fetch(EXPORT_SERVICE, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ shots: shotOrder }),
    });
    const json = await res.json();
    if (json.ok) {
      showToast("Export ready!", "ok");
      window.open(json.url, "_blank");
    } else {
      showToast("Export error: " + json.error, "err");
    }
  } catch (e) {
    showToast("Export failed: " + e.message, "err");
  }
});

// ─── UPLOAD ───────────────────────────────────────────────────────────────
document.getElementById("file-input").addEventListener("change", async e => {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  uploadProgress.style.display = "flex";

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    uploadLabel.textContent = `Uploading ${i+1}/${files.length}: ${file.name}`;
    const parsed = parseShot(file.name, file.name);
    if (!parsed) { showToast(`Skipped: ${file.name} — name format not recognized`, "err"); continue; }
    const { shotKey, version } = parsed;
    const remotePath = `${shotKey}/${file.name}`;
    const { error } = await sb.storage.from(BUCKET).upload(remotePath, file, { upsert: true });
    if (error) { showToast("Upload failed: " + error.message, "err"); }
    else { showToast(`Uploaded: ${file.name}`, "ok"); }
  }

  uploadProgress.style.display = "none";
  e.target.value = "";
  await loadShots();
});

// ─── DRAW ────────────────────────────────────────────────────────────────
document.getElementById("btn-draw").addEventListener("click", () => {
  drawMode = !drawMode;
  document.getElementById("btn-draw").classList.toggle("active", drawMode);
  playerWrap.classList.toggle("draw-mode", drawMode);
  drawToolbar.classList.toggle("visible", drawMode);
  if (drawMode) { video.pause(); restoreFrameAnnotation(); }
});

document.querySelectorAll(".color-swatch").forEach(sw => {
  sw.addEventListener("click", () => {
    document.querySelectorAll(".color-swatch").forEach(s => s.classList.remove("selected"));
    sw.classList.add("selected");
    drawColor = sw.dataset.color;
  });
});

document.getElementById("brush-size").addEventListener("input", e => { drawSize = parseInt(e.target.value); });

function sizeCanvas() {
  const vr = video.getBoundingClientRect();
  canvas.width  = vr.width;
  canvas.height = vr.height;
  canvas.style.width  = vr.width + "px";
  canvas.style.height = vr.height + "px";
  canvas.style.left = (vr.left - playerWrap.getBoundingClientRect().left) + "px";
  canvas.style.top  = (vr.top  - playerWrap.getBoundingClientRect().top)  + "px";
}

new ResizeObserver(sizeCanvas).observe(playerWrap);

canvas.addEventListener("pointerdown", e => {
  if (!drawMode) return;
  isDrawing = true;
  const {x, y} = canvasXY(e);
  lastX = x; lastY = y;
  ctx.beginPath();
  ctx.arc(x, y, drawSize / 2, 0, Math.PI * 2);
  ctx.fillStyle = drawColor;
  ctx.fill();
});
canvas.addEventListener("pointermove", e => {
  if (!isDrawing) return;
  const {x, y} = canvasXY(e);
  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(x, y);
  ctx.strokeStyle = drawColor;
  ctx.lineWidth = drawSize;
  ctx.lineCap = "round";
  ctx.stroke();
  lastX = x; lastY = y;
});
canvas.addEventListener("pointerup", () => { isDrawing = false; });

function canvasXY(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

document.getElementById("btn-clear-canvas").addEventListener("click", () => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
});

document.getElementById("btn-save-frame").addEventListener("click", async () => {
  if (!currentShot) return;
  const frameKey = video.currentTime.toFixed(2);
  if (!annotations[currentShot]) annotations[currentShot] = { frames: {} };
  annotations[currentShot].frames[frameKey] = canvas.toDataURL();
  await saveAnnotations(currentShot);
  showToast("Frame annotation saved ✓", "ok");
});

function restoreFrameAnnotation() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!currentShot) return;
  const frameKey = video.currentTime.toFixed(2);
  const img64 = annotations[currentShot]?.frames?.[frameKey];
  if (img64) {
    const img = new Image();
    img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    img.src = img64;
  }
}

function syncCanvasAnnotation() {
  if (!drawMode) return;
  restoreFrameAnnotation();
}

// ─── ANNOTATIONS (Supabase Storage) ──────────────────────────────────────
function annotationsPath(key) {
  return `annotations/${key}_annotations.json`;
}

async function loadAnnotations(key) {
  try {
    const url = publicUrl(annotationsPath(key));
    const res = await fetch(url);
    if (res.ok) annotations[key] = await res.json();
    else annotations[key] = { frames: {} };
  } catch { annotations[key] = { frames: {} }; }
}

async function saveAnnotations(key) {
  const blob = new Blob([JSON.stringify(annotations[key])], { type: "application/json" });
  await sb.storage.from(BUCKET).upload(annotationsPath(key), blob, { upsert: true });
}

// ─── COMMENTS (Supabase Storage JSON) ────────────────────────────────────
function commentsPath(key) {
  return `annotations/${key}_comments.json`;
}

async function loadComments(key) {
  try {
    const url = publicUrl(commentsPath(key));
    const res = await fetch(url);
    if (res.ok) comments[key] = await res.json();
    else comments[key] = [];
  } catch { comments[key] = []; }
}

async function saveComments(key) {
  const blob = new Blob([JSON.stringify(comments[key])], { type: "application/json" });
  await sb.storage.from(BUCKET).upload(commentsPath(key), blob, { upsert: true });
}

document.getElementById("btn-add-comment").addEventListener("click", addComment);
commentInput.addEventListener("keydown", e => { if (e.key === "Enter" && e.ctrlKey) addComment(); });

async function addComment() {
  const text = commentInput.value.trim();
  if (!text || !currentShot) return;
  const c = { id: Date.now().toString(36) + Math.random().toString(36).slice(2), time: video.currentTime, text };
  if (!comments[currentShot]) comments[currentShot] = [];
  comments[currentShot].push(c);
  comments[currentShot].sort((a,b) => a.time - b.time);
  commentInput.value = "";
  await saveComments(currentShot);
  renderComments();
  renderMarkers();
  renderShotList();
  showToast("Comment added", "ok");
}

function renderComments() {
  const list = comments[currentShot] || [];
  commentCount.textContent = list.length;
  commentsList.innerHTML = "";
  if (!list.length) {
    commentsList.innerHTML = `<div style="padding:16px;color:var(--muted);font-family:var(--mono);font-size:11px;text-align:center;">No comments yet.<br>Play & pause, then type below.</div>`;
    return;
  }
  list.forEach(c => {
    const card = document.createElement("div");
    card.className = "comment-card";
    card.dataset.id = c.id;
    card.innerHTML = `
      <div class="comment-tc">${fmt(c.time)}</div>
      <div class="comment-text">${escHtml(c.text)}</div>
      <div class="comment-actions">
        <button class="btn-edit" data-id="${c.id}">Edit</button>
        <button class="btn-del" data-id="${c.id}">Delete</button>
      </div>`;
    card.addEventListener("click", e => {
      if (e.target.closest(".comment-actions")) return;
      video.currentTime = c.time;
      highlightComment(c.id);
    });
    card.querySelector(".btn-edit").addEventListener("click", () => openEditModal(c.id));
    card.querySelector(".btn-del").addEventListener("click",  () => deleteComment(c.id));
    commentsList.appendChild(card);
  });
}

function highlightComment(id) {
  document.querySelectorAll(".comment-card").forEach(el => el.classList.toggle("highlight", el.dataset.id === id));
}

function escHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ─── EDIT MODAL ───────────────────────────────────────────────────────────
function openEditModal(id) {
  const c = (comments[currentShot] || []).find(x => x.id === id);
  if (!c) return;
  editingCommentId = id;
  document.getElementById("modal-input").value = c.text;
  modalOverlay.classList.add("open");
  document.getElementById("modal-input").focus();
}

document.getElementById("modal-cancel").addEventListener("click", () => {
  modalOverlay.classList.remove("open");
  editingCommentId = null;
});

document.getElementById("modal-confirm").addEventListener("click", async () => {
  const text = document.getElementById("modal-input").value.trim();
  if (!text || !editingCommentId || !currentShot) return;
  const c = comments[currentShot].find(x => x.id === editingCommentId);
  if (c) c.text = text;
  await saveComments(currentShot);
  renderComments();
  modalOverlay.classList.remove("open");
  editingCommentId = null;
  showToast("Comment updated", "ok");
});

async function deleteComment(id) {
  if (!currentShot) return;
  comments[currentShot] = (comments[currentShot] || []).filter(c => c.id !== id);
  await saveComments(currentShot);
  renderComments();
  renderMarkers();
  renderShotList();
  showToast("Comment deleted", "");
}

// ─── INIT ────────────────────────────────────────────────────────────────
loadShots();

// Auto-refresh every 30s (multi-user)
setInterval(loadShots, 30000);
</script>
