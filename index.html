<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Animation Review — Play Scene</title>

  <!-- Supabase v2 UMD -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body{font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial; background:#0f1724; color:#e6eef8; margin:0; padding:28px;}
    .wrap{max-width:1000px;margin:0 auto;}
    h1{margin:0 0 18px 0;font-size:22px}
    .card{background:#0b1220;border-radius:10px;padding:16px;margin-bottom:18px;box-shadow:0 6px 24px rgba(2,6,23,0.6)}
    label{display:block;margin-bottom:8px}
    input[type=file]{display:block;margin-bottom:12px}
    button{background:#1f6feb;border:none;color:white;padding:8px 14px;border-radius:8px;cursor:pointer;margin-right:8px}
    button:active{transform:translateY(1px)}
    .hint{color:#9fb0d6;font-size:13px;margin-top:8px}
    .shots{display:flex;flex-wrap:wrap;gap:14px;margin-top:12px}
    .shot{background:#071027;border-radius:8px;padding:12px;width:calc(50% - 14px);box-sizing:border-box}
    .shot h3{margin:0 0 8px 0;font-size:14px}
    video{width:100%;border-radius:6px;background:black}
    .status{margin-top:8px;color:#9fb0d6;font-size:13px}
    .sceneControls{display:flex;gap:8px;align-items:center;margin-top:12px}
    .currentShot{font-weight:600;margin-left:8px}
    @media (max-width:700px){ .shot{width:100%} }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Animation Review — Upload & Play Scene</h1>

    <div class="card">
      <label for="fileInput"><strong>1) Selecione o playblast (.mov / .mp4)</strong></label>
      <input id="fileInput" type="file" accept="video/*" />
      <div style="margin-top:8px;">
        <button id="btnUpload">Upload</button>
        <button id="btnPlayScene">Play Scene</button>
        <button id="btnStopScene">Stop Scene</button>
      </div>
      <div class="hint">Nomeie seus arquivos com padrão como <code>sh_07_v008.mov</code> ou <code>SH010_v003.mov</code> — o sistema detecta shot e versão automaticamente.</div>
      <div id="status" class="status"></div>
    </div>

    <div class="card">
      <strong>2) Cena — últimas versões de cada shot</strong>
      <div id="shots" class="shots"></div>
      <div id="emptyHint" class="hint"></div>

      <div class="card" style="margin-top:12px;background:#07122a">
        <strong>Scene Player</strong>
        <div id="sceneArea" style="margin-top:8px">
          <!-- player injetado aqui -->
          <div class="sceneControls" style="margin-bottom:8px">
            <button id="scenePrev">◀ Prev</button>
            <button id="scenePlay">▶ Play</button>
            <button id="scenePause">⏸ Pause</button>
            <button id="sceneNext">Next ▶</button>
            <span class="currentShot" id="currentShotLabel"></span>
          </div>
          <div id="scenePlayerWrap"></div>
        </div>
      </div>

    </div>
  </div>

<script>
/* ====== CONFIGURE AQUI AS SUAS CHAVES (já coloquei as que você forneceu) ====== */
const SUPABASE_URL = "https://qdnmeuxojubkijpcesry.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkbm1ldXhvanVia2lqcGNlc3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNzM2NTAsImV4cCI6MjA4ODc0OTY1MH0.UBnWHTKw3Pw2pMgRHvpReg7sLMHwvGm5EU2kqq8990A";
/* ========================================================================== */

const { createClient } = window.supabase;
const client = createClient(SUPABASE_URL, SUPABASE_KEY);

const bucketName = "videos";
const btnUpload = document.getElementById("btnUpload");
const btnPlayScene = document.getElementById("btnPlayScene");
const btnStopScene = document.getElementById("btnStopScene");
const fileInput = document.getElementById("fileInput");
const statusEl = document.getElementById("status");
const shotsContainer = document.getElementById("shots");
const emptyHint = document.getElementById("emptyHint");

let latestShotsMap = {}; // global com o resultado mais recente de loadShots()

btnUpload.addEventListener("click", async () => {
  const f = fileInput.files[0];
  if (!f) { alert("Selecione um arquivo antes."); return; }

  statusEl.textContent = "Enviando...";

  // Detect shot and version from filename (flexível com underscore/maiúsculas)
  const name = f.name;
  const shotMatch = name.match(/(sh[_-]?\d+)/i);
  const versionMatch = name.match(/_v0*(\d+)/i) || name.match(/v0*(\d+)/i);

  if (!shotMatch || !versionMatch) {
    if (!shotMatch) alert("Não foi possível detectar o shot no nome. Use padrão 'sh_07_v001' ou 'SH010_v001'.");
    else alert("Não foi possível detectar a versão. Use padrão '_v001'.");
    statusEl.textContent = "";
    return;
  }

  // normaliza a pasta do shot: exemplo 'sh_07' -> 'SH07'
  const shotRaw = shotMatch[1].toUpperCase().replace(/[_-]/g,""); // SH07 or SH010
  const versionNum = parseInt(versionMatch[1], 10);

  // path onde vai salvar: <shotRaw>/<filename>
  const destPath = `${shotRaw}/${name}`;

  try {
    // upsert true para sobrescrever se já existir com mesmo caminho
    const { data, error } = await client.storage.from(bucketName).upload(destPath, f, { upsert: true });

    if (error) {
      console.error("Upload error:", error);
      alert("Erro no upload: " + (error.message || JSON.stringify(error)));
      statusEl.textContent = "";
      return;
    }

    statusEl.textContent = `Upload concluído: ${shotRaw} v${versionNum.toString().padStart(3,"0")}`;
    fileInput.value = "";
    // recarrega lista
    await loadShots();
  } catch (err) {
    console.error(err);
    alert("Erro inesperado durante upload.");
    statusEl.textContent = "";
  }
});

/**
 * Lista arquivos no bucket e monta latestShotsMap com a última versão por shot.
 * Suporta arquivos no root e arquivos organizados em pastas (shot/file).
 */
async function loadShots(){
  shotsContainer.innerHTML = "";
  emptyHint.textContent = "Carregando...";

  try {
    const { data: rootList, error: errRoot } = await client.storage.from(bucketName).list("", { limit: 1000 });

    if (errRoot) {
      console.error("Erro list root:", errRoot);
      emptyHint.textContent = "Erro ao listar arquivos. Verifique permissões do bucket.";
      return;
    }

    const shotsMap = {};

    function processFilePath(path) {
      const filename = path.split("/").pop();
      const shotMatch = filename.match(/(sh[_-]?\d+)/i) || (path.match(/^(sh[_-]?\d+)/i));
      const versionMatch = filename.match(/_v0*(\d+)/i) || filename.match(/v0*(\d+)/i);

      if (!shotMatch || !versionMatch) return;

      const shotRaw = shotMatch[1].toUpperCase().replace(/[_-]/g, ""); // e.g. "SH07" or "SH010"
      const version = parseInt(versionMatch[1], 10);

      if (!shotsMap[shotRaw] || shotsMap[shotRaw].version < version) {
        shotsMap[shotRaw] = { version, path, fileName: filename };
      }
    }

    for (const entry of rootList) {
      const name = entry.name || entry;
      if (name.match(/\.(mov|mp4|m4v)$/i)) {
        // file at root
        processFilePath(name);
      } else {
        const { data: innerList, error: e2 } = await client.storage.from(bucketName).list(name, { limit: 1000 });
        if (e2) {
          processFilePath(name);
        } else {
          for (const f of innerList) {
            processFilePath(`${name}/${f.name}`);
          }
        }
      }
    }

    latestShotsMap = shotsMap; // salva globalmente para o player usar

    const keys = Object.keys(shotsMap).sort((a,b)=>{
      const na = parseInt(a.replace(/[^0-9]/g,''),10);
      const nb = parseInt(b.replace(/[^0-9]/g,''),10);
      return na - nb;
    });

    if (keys.length === 0) {
      emptyHint.textContent = "Nenhum shot encontrado no bucket. Faça um upload para começar.";
      latestShotsMap = {};
      return;
    } else {
      emptyHint.textContent = "";
    }

    // Render shots (sorted)
    shotsContainer.innerHTML = "";
    for (const shotKey of keys) {
      const info = shotsMap[shotKey];
      const parts = info.path.split("/");
      const encodedParts = parts.map(p => encodeURIComponent(p));
      const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/${bucketName}/${encodedParts.join("/")}`;

      const wrap = document.createElement("div");
      wrap.className = "shot";

      const title = document.createElement("h3");
      title.textContent = `${shotKey} — v${info.version.toString().padStart(3,"0")}`;
      wrap.appendChild(title);

      const vid = document.createElement("video");
      vid.src = publicUrl;
      vid.controls = true;
      vid.setAttribute("playsinline", "");
      vid.setAttribute("preload", "none");
      wrap.appendChild(vid);

      shotsContainer.appendChild(wrap);
    }

  } catch (err) {
    console.error("Erro loadShots:", err);
    emptyHint.textContent = "Erro inesperado ao carregar arquivos.";
  }
}

// ---------- Scene player logic ----------
let scenePlaylist = []; // array of {shot, url}
let sceneIndex = 0;
let sceneVideoEl = null;
const scenePlayerWrap = document.getElementById("scenePlayerWrap");
const currentShotLabel = document.getElementById("currentShotLabel");

function buildPlaylistFromLatestShots(){
  const keys = Object.keys(latestShotsMap).sort((a,b)=>{
    const na = parseInt(a.replace(/[^0-9]/g,''),10);
    const nb = parseInt(b.replace(/[^0-9]/g,''),10);
    return na - nb;
  });
  const list = [];
  for (const k of keys) {
    const info = latestShotsMap[k];
    const parts = info.path.split("/");
    const encodedParts = parts.map(p => encodeURIComponent(p));
    const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/${bucketName}/${encodedParts.join("/")}`;
    list.push({ shot: k, url: publicUrl });
  }
  return list;
}

function createOrGetSceneVideo(){
  if (sceneVideoEl) return sceneVideoEl;
  const vid = document.createElement("video");
  vid.controls = true;
  vid.width = 800;
  vid.style.maxWidth = "100%";
  vid.setAttribute("playsinline","");
  vid.setAttribute("preload","auto");
  scenePlayerWrap.innerHTML = "";
  scenePlayerWrap.appendChild(vid);
  sceneVideoEl = vid;

  // quando terminar um shot, avança
  vid.addEventListener("ended", () => {
    sceneNext();
  });

  return vid;
}

async function playSceneFrom(index=0){
  if (!latestShotsMap || Object.keys(latestShotsMap).length === 0) {
    alert("Não há shots para tocar. Faça upload primeiro.");
    return;
  }
  scenePlaylist = buildPlaylistFromLatestShots();
  if (scenePlaylist.length === 0) { alert("Playlist vazia."); return; }
  sceneIndex = index;
  const vid = createOrGetSceneVideo();
  const item = scenePlaylist[sceneIndex];
  vid.src = item.url;
  currentShotLabel.textContent = `${item.shot} (${sceneIndex+1}/${scenePlaylist.length})`;
  try {
    await vid.play();
  } catch(e){
    // autoplay pode ser bloqueado; usuário precisará clicar Play manualmente
    console.warn("play blocked", e);
  }
}

function scenePause(){
  if (sceneVideoEl) sceneVideoEl.pause();
}

function sceneNext(){
  if (!scenePlaylist || scenePlaylist.length === 0) return;
  sceneIndex = Math.min(sceneIndex+1, scenePlaylist.length-1);
  const item = scenePlaylist[sceneIndex];
  if (!sceneVideoEl) createOrGetSceneVideo();
  sceneVideoEl.src = item.url;
  currentShotLabel.textContent = `${item.shot} (${sceneIndex+1}/${scenePlaylist.length})`;
  sceneVideoEl.play().catch(()=>{});
}

function scenePrev(){
  if (!scenePlaylist || scenePlaylist.length === 0) return;
  sceneIndex = Math.max(sceneIndex-1, 0);
  const item = scenePlaylist[sceneIndex];
  if (!sceneVideoEl) createOrGetSceneVideo();
  sceneVideoEl.src = item.url;
  currentShotLabel.textContent = `${item.shot} (${sceneIndex+1}/${scenePlaylist.length})`;
  sceneVideoEl.play().catch(()=>{});
}

function stopScene(){
  if (sceneVideoEl) {
    sceneVideoEl.pause();
    sceneVideoEl.currentTime = 0;
    sceneVideoEl.src = "";
    scenePlayerWrap.innerHTML = "";
    sceneVideoEl = null;
  }
  scenePlaylist = [];
  sceneIndex = 0;
  currentShotLabel.textContent = "";
}

// bind UI buttons
btnPlayScene.addEventListener("click", async () => {
  // ensure latest listing is loaded
  await loadShots();
  playSceneFrom(0);
});
btnStopScene.addEventListener("click", () => {
  stopScene();
});
document.getElementById("scenePlay").addEventListener("click", async ()=> {
  if (!sceneVideoEl) {
    await loadShots();
    playSceneFrom(sceneIndex || 0);
  } else {
    sceneVideoEl.play().catch(()=>{});
  }
});
document.getElementById("scenePause").addEventListener("click", ()=> scenePause());
document.getElementById("sceneNext").addEventListener("click", ()=> sceneNext());
document.getElementById("scenePrev").addEventListener("click", ()=> scenePrev());

// inicializa
loadShots();

</script>
</body>
</html>
